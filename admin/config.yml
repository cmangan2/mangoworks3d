backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:

  - name: "catalog"
    label: "Shop Designs"
    folder: "_data/catalog"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "Design Name", name: "name", widget: "string" }
      - { label: "Description", name: "desc", widget: "text" }
      - { label: "Emoji (placeholder icon)", name: "emoji", widget: "string", default: "🖨️" }
      - { label: "Photo (optional)", name: "image", widget: "image", required: false }
      - { label: "Active (show in shop)", name: "active", widget: "boolean", default: true }

  - name: "settings"
    label: "Materials & Colors"
    files:
      - name: "materials"
        label: "Materials & Their Colors"
        file: "_data/materials.json"
        fields:
          - label: "Materials"
            name: "items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Material Name", name: "name", widget: "string" }
              - label: "Available Colors for this Material"
                name: "colors"
                widget: "list"
                summary: "{{fields.name}}"
                fields:
                  - { label: "Color Name", name: "name", widget: "string" }
                  - { label: "Hex Code (e.g. #FF8C00)", name: "hex", widget: "string" }
